<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray Tessellation - Font Generator</title>
    <!-- Incluimos opentype.js para generar la fuente final -->
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@latest/dist/opentype.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Evita el cuadrado azul en móviles al tocar */
        }
        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
        }
        
        .normal-piece, .inv-piece {
            pointer-events: all;
            cursor: pointer;
            transition: fill 0.2s ease;
        }

        .normal-piece {
            fill: transparent;
            stroke: #888888;
            stroke-width: 1.5;
        }

        .inv-piece {
            fill: transparent;
            stroke: none;
        }

        .ghost {
            fill: rgba(255, 255, 255, 0.12) !important;
            stroke: rgba(255, 255, 255, 0.3) !important;
        }

        .active {
            fill: orange !important;
            stroke: orange !important;
            stroke-width: 1.5 !important;
        }

        /* Interfaz de Generador de Fuentes */
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.95);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            color: #eee;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 280px;
            backdrop-filter: blur(10px);
        }
        #ui-panel h3 {
            margin: 0;
            font-size: 18px;
            text-align: center;
            border-bottom: 1px solid #555;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #e67e22;
        }
        .char-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .char-group label {
            font-size: 13px;
            color: #aaa;
            margin: 0;
            width: 100px;
        }
        .char-select {
            flex-grow: 1;
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            outline: none;
        }
        .char-select:hover {
            background: #444;
        }
        #ui-panel button {
            padding: 10px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            outline: none;
        }
        #ui-panel button:hover {
            background: #444;
        }
        #current-char-display {
            text-align: center;
            font-size: 16px;
            color: #fff;
            margin: 5px 0;
            padding: 12px;
            background: #111;
            border-radius: 4px;
            border: 1px solid #444;
        }
        #char-display-value {
            font-size: 24px;
            color: #e67e22;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }
        #btn-export {
            background: #e67e22 !important;
            border-color: #d35400 !important;
            font-weight: bold;
            margin-top: 10px;
        }
        #btn-export:hover {
            background: #d35400 !important;
        }

        /* Botón de Menú Móvil */
        #mobile-menu-btn {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20;
            background: #e67e22;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Panel inferior Desplegable para el probador de fuente */
        #tester-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 20, 0.98);
            border-top: 2px solid #e67e22;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 40vh;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #tester-panel.collapsed {
            height: 45px;
            border-top: 1px solid #444;
        }

        #tester-header {
            height: 45px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e67e22;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            user-select: none;
            background: rgba(30, 30, 30, 0.8);
            transition: background 0.2s;
        }
        
        #tester-header:hover {
            background: rgba(50, 50, 50, 0.8);
        }

        #tester-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            opacity: 1;
            transition: opacity 0.3s;
        }

        #tester-panel.collapsed #tester-content {
            opacity: 0;
            pointer-events: none;
        }

        #font-tester {
            width: 100%;
            height: 100%;
            background: #111;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            font-size: 120px; /* Tamaño GIGANTE */
            outline: none;
            box-sizing: border-box;
            text-align: center;
            resize: none;
        }
        #font-tester:focus {
            border-color: #e67e22;
        }

        /* Adaptación a Móviles */
        @media (max-width: 768px) {
            #mobile-menu-btn {
                display: block;
            }
            #ui-panel {
                top: 60px;
                right: 15px;
                width: calc(100vw - 70px);
                max-width: 300px;
                max-height: 70vh;
                overflow-y: auto;
                transform: translateX(150%);
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #ui-panel.open {
                transform: translateX(0);
            }
            #font-tester {
                font-size: 60px; /* Letra un poco más ajustada para móvil */
            }
            #tester-panel.collapsed {
                height: 50px;
            }
            #tester-header {
                height: 50px;
                min-height: 50px;
            }
        }

        #status-msg {
            font-size: 12px;
            color: #2ecc71;
            text-align: center;
            height: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <svg id="tessellation">
        <defs>

 149.353 67.5524 149.589C66.5229 152.369 65.8722 153.392 63.0405 152.772Z" />
        </defs>
    </svg>

    <button id="mobile-menu-btn">⚙️ Herramientas</button>

    <div id="ui-panel">
        <h3>Generador de Fuentes</h3>
        
        <div class="char-group">
            <label>Minúsculas:</label>
            <select class="char-select" id="sel-lower">
                <option value="" disabled selected>-- Elige --</option>
            </select>
        </div>
        
        <div class="char-group">
            <label>Mayúsculas:</label>
            <select class="char-select" id="sel-upper">
                <option value="" disabled selected>-- Elige --</option>
            </select>
        </div>
        
        <div class="char-group">
            <label>Números:</label>
            <select class="char-select" id="sel-numbers">
                <option value="" disabled selected>-- Elige --</option>
            </select>
        </div>
        
        <div class="char-group">
            <label>Símbolos:</label>
            <select class="char-select" id="sel-symbols">
                <option value="" disabled selected>-- Elige --</option>
            </select>
        </div>

        <hr style="border-color: #555; width: 100%; margin: 5px 0;">

        <div class="char-group">
            <label>Guía Fantasma:</label>
            <input type="text" id="ghost-input" class="char-select" maxlength="1" placeholder="Ej: A" style="text-align: center;">
        </div>

        <div class="char-group" style="margin-top: 5px;">
            <label style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
                Rotar Fondo: 
                <span style="display: flex; align-items: center;">
                    <input type="number" id="rot-input" value="0" step="any" style="width: 50px; text-align: right; background: transparent; color: orange; font-weight: bold; border: 1px solid #555; border-radius: 3px; padding: 2px; -moz-appearance: textfield;">°
                </span>
            </label>
            <div style="display: flex; width: 100%; align-items: center; margin-top: 5px;">
                <input type="range" id="rot-slider" min="-180" max="180" value="0" step="any" style="flex-grow: 1; cursor: pointer;">
                <button id="btn-rot-0" style="padding: 5px; margin-left: 5px; font-size: 12px; width: 30px;" title="Rotación Diagonal"> / </button>
                <button id="btn-reset-rot" style="padding: 5px; margin-left: 5px; font-size: 12px; width: 50px;" title="Rotación Vertical (Por Defecto)">0°</button>
            </div>
        </div>

        <div id="current-char-display">Editando:<br><span id="char-display-value">Ninguno</span></div>

        <button id="btn-save">Guardar Letra</button>
        <button id="btn-clear">Limpiar Lienzo</button>
        <div id="status-msg"></div>
        
        <button id="btn-export">Exportar Fuente (.otf)</button>
        <button id="btn-export-svg" style="margin-top: 5px; background: #e67e22;">Exportar Dibujo (.svg)</button>
    </div>

    <!-- Panel Inferior Desplegable -->
    <div id="tester-panel" class="collapsed">
        <div id="tester-header">
            <span id="tester-icon">&#x25B2;</span> &nbsp; Probador de Fuente en Vivo
        </div>
        <div id="tester-content">
            <textarea id="font-tester" placeholder="Escribe aquí..."></textarea>
        </div>
    </div>

    <script>
        // Inicializar selectores de letras
        const lowerChars = "abcdefghijklmnopqrstuvwxyz".split('');
        const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
        const numChars = "0123456789".split('');
        const symChars = "!\"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~".split('');

        function populateSelect(id, chars) {
            const sel = document.getElementById(id);
            chars.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                sel.appendChild(opt);
            });
            sel.addEventListener('change', handleCharChange);
        }

        populateSelect('sel-lower', lowerChars);
        populateSelect('sel-upper', upperChars);
        populateSelect('sel-numbers', numChars);
        populateSelect('sel-symbols', symChars);

        // ESTADO DE LA FUENTE
        const fontData = {}; // Guarda Sets con las coordenadas para cada letra
        let currentLetter = ''; // Comienza vacío
        let currentLetterData = new Set(); // Guarda strings "r,c,type"

        const svg = document.getElementById('tessellation');
        const container = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        svg.appendChild(container);

        // Capa de Letra Fantasma (Texto nativo como fallback)
        const ghostText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        ghostText.setAttribute('font-family', 'sans-serif');
        ghostText.setAttribute('font-size', '1200');
        ghostText.setAttribute('font-weight', 'bold');
        ghostText.setAttribute('fill', 'rgba(255, 255, 255, 0.06)');
        ghostText.setAttribute('text-anchor', 'middle');
        ghostText.setAttribute('dominant-baseline', 'central');
        ghostText.setAttribute('pointer-events', 'none');
        ghostText.setAttribute('x', '0');
        ghostText.setAttribute('y', '0');
        container.appendChild(ghostText);

        let currentGhostData = new Set(); // Guarda las teselas de la letra fantasma si existe

        document.getElementById('ghost-input').addEventListener('input', (e) => {
            const val = e.target.value;
            if (val && fontData[val] && fontData[val].tiles.size > 0) {
                // El usuario ya dibujó esta letra, usamos sus teselas como fantasma
                currentGhostData = fontData[val].tiles;
                ghostText.textContent = ''; // Ocultar texto nativo
            } else {
                // No la ha dibujado, usamos texto nativo de referencia
                currentGhostData = new Set();
                ghostText.textContent = val;
            }
            refreshCanvasVisuals();
        });

        const w = 162.42;
        const dy = 152.12;
        const skewX = 66.64;
        const skewY = 18.07;
        const invX = 64.85;
        const invY = 27.97;
        
        const det = (skewX * skewY) - (w * dy);
        
        function getRC(x, y) {
            const r = (skewY * x - w * y) / det;
            const c = (-dy * x + skewX * y) / det;
            return {r, c};
        }

        let scale = 1;
        let rotation = 0; // UI Rotation. Math rotation is rotation - 66.3
        let panX = window.innerWidth / 2;
        let panY = window.innerHeight / 2 - 100;
        let isDragging = false;
        let startDragX, startDragY;
        let startClientX, startClientY;
        let isMoved = false;

        const renderedPieces = new Set();

        function togglePiece(e) {
            if (!currentLetter) {
                alert("Por favor, selecciona un carácter en el menú de la derecha antes de dibujar.");
                return;
            }
            if (!isMoved) {
                const piece = e.currentTarget;
                const r = piece.getAttribute('data-r');
                const c = piece.getAttribute('data-c');
                const type = piece.getAttribute('data-type');
                const key = `${r},${c},${type}`;

                const isActive = piece.classList.toggle('active');
                
                if (isActive) {
                    piece.classList.remove('ghost');
                    currentLetterData.add(key);
                } else {
                    if (currentGhostData.has(key)) piece.classList.add('ghost');
                    currentLetterData.delete(key);
                }
            }
        }

        function createPiece(r, c) {
            const x = c * w + r * skewX;
            const y = r * dy + c * skewY;
            
            const keyNorm = `${r},${c},normal`;
            const keyInv = `${r},${c},inv`;

            // Pieza Normal
            const useNormal = document.createElementNS('http://www.w3.org/2000/svg', 'use');
            useNormal.setAttribute('href', '#piece');
            useNormal.setAttribute('class', 'normal-piece');
            useNormal.setAttribute('data-r', r);
            useNormal.setAttribute('data-c', c);
            useNormal.setAttribute('data-type', 'normal');
            useNormal.setAttribute('transform', `translate(${x}, ${y})`);
            useNormal.addEventListener('click', togglePiece);
            if (currentLetterData.has(keyNorm)) {
                useNormal.classList.add('active');
            } else if (currentGhostData.has(keyNorm)) {
                useNormal.classList.add('ghost');
            }
            container.appendChild(useNormal);

            // Pieza Invertida
            const useInv = document.createElementNS('http://www.w3.org/2000/svg', 'use');
            useInv.setAttribute('href', '#piece');
            useInv.setAttribute('class', 'inv-piece');
            useInv.setAttribute('data-r', r);
            useInv.setAttribute('data-c', c);
            useInv.setAttribute('data-type', 'inv');
            useInv.setAttribute('transform', `translate(${x + invX}, ${y + invY}) rotate(180, 78.5, 76.5)`);
            useInv.addEventListener('click', togglePiece);
            if (currentLetterData.has(keyInv)) {
                useInv.classList.add('active');
            } else if (currentGhostData.has(keyInv)) {
                useInv.classList.add('ghost');
            }
            container.appendChild(useInv);
        }

        function renderVisiblePieces() {
            const rect = svg.getBoundingClientRect();
            const width = rect.width || window.innerWidth;
            const height = rect.height || window.innerHeight;

            // Esquinas de la pantalla
            const corners = [
                {x: 0, y: 0},
                {x: width, y: 0},
                {x: width, y: height},
                {x: 0, y: height}
            ];

            // Invertir rotación y escala para encontrar las coordenadas locales
            const mathRot = rotation - 66.3;
            const rad = -mathRot * Math.PI / 180;
            const cosA = Math.cos(rad);
            const sinA = Math.sin(rad);

            const localCorners = corners.map(pt => {
                const dx = (pt.x - panX) / scale;
                const dy = (pt.y - panY) / scale;
                return {
                    x: dx * cosA - dy * sinA,
                    y: dx * sinA + dy * cosA
                };
            });

            const minX = Math.min(...localCorners.map(p => p.x)) - 400;
            const maxX = Math.max(...localCorners.map(p => p.x)) + 400;
            const minY = Math.min(...localCorners.map(p => p.y)) - 400;
            const maxY = Math.max(...localCorners.map(p => p.y)) + 400;

            const p1 = getRC(minX, minY);
            const p2 = getRC(maxX, minY);
            const p3 = getRC(minX, maxY);
            const p4 = getRC(maxX, maxY);

            const minR = Math.floor(Math.min(p1.r, p2.r, p3.r, p4.r)) - 1;
            const maxR = Math.ceil(Math.max(p1.r, p2.r, p3.r, p4.r)) + 1;
            const minC = Math.floor(Math.min(p1.c, p2.c, p3.c, p4.c)) - 1;
            const maxC = Math.ceil(Math.max(p1.c, p2.c, p3.c, p4.c)) + 1;

            for (let r = minR; r <= maxR; r++) {
                for (let c = minC; c <= maxC; c++) {
                    const key = `${r},${c}`;
                    if (!renderedPieces.has(key)) {
                        renderedPieces.add(key);
                        createPiece(r, c);
                    }
                }
            }
        }

        renderVisiblePieces();

        // Controles UI
        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.style.opacity = 1;
            setTimeout(() => el.style.opacity = 0, 2000);
        }

        function refreshCanvasVisuals() {
            // Actualizar todas las piezas ya creadas en el DOM
            const pieces = container.querySelectorAll('use');
            pieces.forEach(p => {
                const r = p.getAttribute('data-r');
                const c = p.getAttribute('data-c');
                const type = p.getAttribute('data-type');
                const key = `${r},${c},${type}`;
                
                p.classList.remove('active', 'ghost');
                
                if (currentLetterData.has(key)) {
                    p.classList.add('active');
                } else if (currentGhostData.has(key)) {
                    p.classList.add('ghost');
                }
            });
        }

        document.getElementById('btn-save').addEventListener('click', () => {
            if (!currentLetter) return;
            // Clonamos el Set para guardarlo y la rotación
            fontData[currentLetter] = {
                tiles: new Set(currentLetterData),
                rotation: rotation
            };
            updateTestFont(); // Actualizamos la fuente en vivo
            showStatus(`¡'${currentLetter}' guardada!`);
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            currentLetterData.clear();
            refreshCanvasVisuals();
            showStatus('Lienzo limpio');
        });

        document.getElementById('rot-slider').addEventListener('input', (e) => {
            rotation = parseFloat(e.target.value);
            document.getElementById('rot-input').value = rotation;
            updateTransform();
        });

        document.getElementById('rot-input').addEventListener('input', (e) => {
            let val = parseFloat(e.target.value);
            if (isNaN(val)) val = 0;
            rotation = val;
            document.getElementById('rot-slider').value = rotation;
            updateTransform();
        });

        document.getElementById('btn-reset-rot').addEventListener('click', () => {
            rotation = 0;
            document.getElementById('rot-slider').value = 0;
            document.getElementById('rot-input').value = 0;
            updateTransform();
        });

        document.getElementById('btn-rot-0').addEventListener('click', () => {
            rotation = 66.3;
            document.getElementById('rot-slider').value = 66.3;
            document.getElementById('rot-input').value = 66.3;
            updateTransform();
        });

        function handleCharChange(e) {
            const newVal = e.target.value;
            if (!newVal) return;

            // Resetear los otros menús desplegables
            document.querySelectorAll('.char-select').forEach(sel => {
                if (sel !== e.target) sel.value = "";
            });

            // Autoguardar la letra anterior
            if (currentLetter) {
                fontData[currentLetter] = {
                    tiles: new Set(currentLetterData),
                    rotation: rotation
                };
                updateTestFont(); 
            }
            
            // Cambiar a la nueva
            currentLetter = newVal;
            document.getElementById('char-display-value').textContent = currentLetter;
            
            if (fontData[currentLetter]) {
                currentLetterData = new Set(fontData[currentLetter].tiles);
                rotation = fontData[currentLetter].rotation !== undefined ? fontData[currentLetter].rotation : 0;
            } else {
                currentLetterData = new Set();
                rotation = 0;
            }
            document.getElementById('rot-slider').value = rotation;
            document.getElementById('rot-input').value = rotation;
            updateTransform();
            refreshCanvasVisuals();
        }

        // Lógica del Menú Móvil
        const uiPanel = document.getElementById('ui-panel');
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            uiPanel.classList.toggle('open');
        });

        // Lógica del Cajón Desplegable (Drawer)
        const testerPanel = document.getElementById('tester-panel');
        const testerHeader = document.getElementById('tester-header');
        const testerIcon = document.getElementById('tester-icon');
        
        testerHeader.addEventListener('click', () => {
            testerPanel.classList.toggle('collapsed');
            if (testerPanel.classList.contains('collapsed')) {
                testerIcon.innerHTML = '&#x25B2;'; // Flecha Arriba
            } else {
                testerIcon.innerHTML = '&#x25BC;'; // Flecha Abajo
            }
        });

        // Zoom y Pan
        svg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = -e.deltaY * 0.002;
            let newScale = scale * (1 + delta);
            newScale = Math.max(0.1, Math.min(newScale, 10)); 
            const rect = svg.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            panX = mouseX - (mouseX - panX) * (newScale / scale);
            panY = mouseY - (mouseY - panY) * (newScale / scale);
            scale = newScale;
            updateTransform();
        });

        svg.addEventListener('mousedown', (e) => {
            isDragging = true;
            isMoved = false;
            startClientX = e.clientX;
            startClientY = e.clientY;
            startDragX = e.clientX - panX;
            startDragY = e.clientY - panY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            if (Math.abs(e.clientX - startClientX) > 3 || Math.abs(e.clientY - startClientY) > 3) {
                isMoved = true;
            }
            panX = e.clientX - startDragX;
            panY = e.clientY - startDragY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            setTimeout(() => { isMoved = false; }, 50);
        });

        // Soporte Táctil (Móviles)
        let initialPinchDistance = null;
        let initialScale = 1;

        svg.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                isMoved = false;
                startClientX = e.touches[0].clientX;
                startClientY = e.touches[0].clientY;
                startDragX = e.touches[0].clientX - panX;
                startDragY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialScale = scale;
            }
        }, { passive: false });

        svg.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                if (Math.abs(e.touches[0].clientX - startClientX) > 5 || Math.abs(e.touches[0].clientY - startClientY) > 5) {
                    isMoved = true;
                }
                panX = e.touches[0].clientX - startDragX;
                panY = e.touches[0].clientY - startDragY;
                updateTransform();
            } else if (e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault(); // Evitar zoom nativo del navegador
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const zoomFactor = currentDistance / initialPinchDistance;
                let newScale = initialScale * zoomFactor;
                newScale = Math.max(0.1, Math.min(newScale, 10));

                const pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const rect = svg.getBoundingClientRect();
                const mouseX = pinchCenterX - rect.left;
                const mouseY = pinchCenterY - rect.top;
                
                panX = mouseX - (mouseX - panX) * (newScale / scale);
                panY = mouseY - (mouseY - panY) * (newScale / scale);
                scale = newScale;
                updateTransform();
            }
        }, { passive: false });

        svg.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialPinchDistance = null;
            }
            if (e.touches.length === 0) {
                isDragging = false;
                setTimeout(() => { isMoved = false; }, 50);
            }
        });

        function updateTransform() {
            const mathRot = rotation - 66.3;
            container.setAttribute('transform', `translate(${panX}, ${panY}) scale(${scale}) rotate(${mathRot})`);
            renderVisiblePieces();
        }

        // === LOGICA DE EXPORTACION DE FUENTE (OpenType.js) ===
        
        // 1. Parser básico para el string de la ruta SVG (M... C... L... Z)
        function parseSVGPath(dStr) {
            const commands = [];
            const regex = /([MCLZ])([^MCLZ]*)/gi;
            let match;
            while ((match = regex.exec(dStr)) !== null) {
                const type = match[1].toUpperCase();
                const argsStr = match[2].trim();
                // Separar los números (incluso si no tienen espacios pero tienen signos negativos)
                const spacedArgs = argsStr.replace(/-/g, ' -').trim();
                const args = spacedArgs.split(/[\s,]+/).filter(s => s !== '').map(parseFloat);
                commands.push({ type, args });
            }
            return commands;
        }

        const rawPiecePath = document.getElementById('piece').getAttribute('d');
        const parsedCommands = parseSVGPath(rawPiecePath);

        // 2. Extractor de ruta SVG pura en coordenadas matemáticas
        function getRawPathForLetter(letterObj) {
            if (!letterObj || !letterObj.tiles || letterObj.tiles.size === 0) return null;
            
            const pieceSet = letterObj.tiles;
            const rotAngle = letterObj.rotation !== undefined ? letterObj.rotation : 0;
            const mathRot = rotAngle - 66.3;
            const rad = mathRot * Math.PI / 180;
            const cosA = Math.cos(rad);
            const sinA = Math.sin(rad);

            const path = new opentype.Path();
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;

            pieceSet.forEach(key => {
                const [rStr, cStr, type] = key.split(',');
                const r = parseInt(rStr);
                const c = parseInt(cStr);
                
                let tx = c * w + r * skewX;
                let ty = r * dy + c * skewY;

                let baseTransformFn;
                if (type === 'inv') {
                    tx += invX;
                    ty += invY;
                    baseTransformFn = (px, py) => {
                        const rx = 157 - px;
                        const ry = 153 - py;
                        return [rx + tx, ry + ty];
                    };
                } else {
                    baseTransformFn = (px, py) => [px + tx, py + ty];
                }

                const transformFn = (px, py) => {
                    const [bx, by] = baseTransformFn(px, py);
                    return [bx * cosA - by * sinA, bx * sinA + by * cosA];
                };

                parsedCommands.forEach(cmd => {
                    if (cmd.type === 'M') {
                        const [px, py] = transformFn(cmd.args[0], cmd.args[1]);
                        path.moveTo(px, py);
                        minX = Math.min(minX, px); maxX = Math.max(maxX, px);
                        minY = Math.min(minY, py); maxY = Math.max(maxY, py);
                    } else if (cmd.type === 'L') {
                        const [px, py] = transformFn(cmd.args[0], cmd.args[1]);
                        path.lineTo(px, py);
                        minX = Math.min(minX, px); maxX = Math.max(maxX, px);
                        minY = Math.min(minY, py); maxY = Math.max(maxY, py);
                    } else if (cmd.type === 'C') {
                        const [cx1, cy1] = transformFn(cmd.args[0], cmd.args[1]);
                        const [cx2, cy2] = transformFn(cmd.args[2], cmd.args[3]);
                        const [px, py] = transformFn(cmd.args[4], cmd.args[5]);
                        path.curveTo(cx1, cy1, cx2, cy2, px, py);
                        minX = Math.min(minX, px); maxX = Math.max(maxX, px);
                        minY = Math.min(minY, py); maxY = Math.max(maxY, py);
                    } else if (cmd.type === 'Z') {
                        path.close();
                    }
                });
            });

            return { path, minX, maxX, minY, maxY };
        }

        // 3. Generador de Glyph (Letra) para OpenType
        function generateGlyphForLetter(char, letterObj) {
            const rawData = getRawPathForLetter(letterObj);
            if (!rawData) return null;
            
            const { path, minX, maxX, minY, maxY } = rawData;
            const width = maxX - minX;
            const height = maxY - minY;
            const fontScale = 800 / height;
            
            const finalPath = new opentype.Path();
            path.commands.forEach(cmd => {
                if (cmd.type === 'M') {
                    finalPath.moveTo((cmd.x - minX) * fontScale, (maxY - cmd.y) * fontScale);
                } else if (cmd.type === 'L') {
                    finalPath.lineTo((cmd.x - minX) * fontScale, (maxY - cmd.y) * fontScale);
                } else if (cmd.type === 'C') {
                    finalPath.curveTo(
                        (cmd.x1 - minX) * fontScale, (maxY - cmd.y1) * fontScale,
                        (cmd.x2 - minX) * fontScale, (maxY - cmd.y2) * fontScale,
                        (cmd.x - minX) * fontScale, (maxY - cmd.y) * fontScale
                    );
                } else if (cmd.type === 'Z') {
                    finalPath.close();
                }
            });

            return new opentype.Glyph({
                name: char,
                unicode: char.charCodeAt(0),
                advanceWidth: (width * fontScale) + 100, // 100 de espacio entre letras
                path: finalPath
            });
        }

        // 4. Lógica unificada para ensamblar la fuente OpenType
        function createOpenTypeFont() {
            const glyphs = [];
            
            // Glyph requerido por defecto (notDef)
            const notdefGlyph = new opentype.Glyph({
                name: '.notdef',
                unicode: 0,
                advanceWidth: 500,
                path: new opentype.Path()
            });
            glyphs.push(notdefGlyph);

            let letrasCount = 0;
            for (const [char, letterObj] of Object.entries(fontData)) {
                if (letterObj && letterObj.tiles && letterObj.tiles.size > 0) {
                    const g = generateGlyphForLetter(char, letterObj);
                    if (g) {
                        glyphs.push(g);
                        letrasCount++;
                    }
                }
            }

            if (letrasCount === 0) return null;

            return new opentype.Font({
                familyName: 'Tessellation Font',
                styleName: 'Regular',
                unitsPerEm: 1000,
                ascender: 800,
                descender: -200,
                glyphs: glyphs
            });
        }

        // Lógica de Prueba en Vivo (Actualiza la fuente en memoria)
        let currentFontUrl = null;
        function updateTestFont() {
            try {
                const font = createOpenTypeFont();
                if (!font) return;
                
                const buffer = font.toArrayBuffer();
                const blob = new Blob([buffer], { type: 'font/opentype' });
                
                if (currentFontUrl) URL.revokeObjectURL(currentFontUrl);
                currentFontUrl = URL.createObjectURL(blob);
                
                let style = document.getElementById('dynamic-font-style');
                if (!style) {
                    style = document.createElement('style');
                    style.id = 'dynamic-font-style';
                    document.head.appendChild(style);
                }
                
                style.innerHTML = `
                    @font-face {
                        font-family: 'TestTessellationFont';
                        src: url('${currentFontUrl}') format('opentype');
                    }
                    #font-tester {
                        font-family: 'TestTessellationFont', sans-serif !important;
                    }
                `;
            } catch (e) {
                console.error("Error al actualizar la fuente de prueba:", e);
            }
        }

        document.getElementById('btn-export').addEventListener('click', () => {
            // Guardar la letra actual antes de exportar
            fontData[currentLetter] = { tiles: new Set(currentLetterData), rotation: rotation };
            updateTestFont();

            const font = createOpenTypeFont();
            if (!font) {
                alert("Dibuja al menos una letra antes de exportar.");
                return;
            }

            showStatus('Generando fuente...');
            try {
                font.download();
                showStatus('Fuente descargada OK!');
            } catch (e) {
                console.error(e);
                alert("Error generando fuente: " + e.message);
            }
        });

        // Función de Descarga de SVG Individual
        document.getElementById('btn-export-svg').addEventListener('click', () => {
            if (!currentLetter || !fontData[currentLetter] || fontData[currentLetter].tiles.size === 0) {
                alert("Guarda tu dibujo primero antes de exportarlo.");
                return;
            }

            const rawData = getRawPathForLetter(fontData[currentLetter]);
            if (!rawData) return;
            
            const { path, minX, maxX, minY, maxY } = rawData;
            const width = maxX - minX;
            const height = maxY - minY;
            const margin = 20;

            const offsetPath = new opentype.Path();
            path.commands.forEach(cmd => {
                if (cmd.type === 'M') offsetPath.moveTo(cmd.x - minX + margin, cmd.y - minY + margin);
                else if (cmd.type === 'L') offsetPath.lineTo(cmd.x - minX + margin, cmd.y - minY + margin);
                else if (cmd.type === 'C') offsetPath.curveTo(
                    cmd.x1 - minX + margin, cmd.y1 - minY + margin,
                    cmd.x2 - minX + margin, cmd.y2 - minY + margin,
                    cmd.x - minX + margin, cmd.y - minY + margin
                );
                else if (cmd.type === 'Z') offsetPath.close();
            });

            const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width + margin*2} ${height + margin*2}">
  <path d="${offsetPath.toPathData(2)}" fill="orange"/>
</svg>`;
            
            const blob = new Blob([svgContent], {type: "image/svg+xml"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Tessellation_${currentLetter}.svg`;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
